<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quiz System</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: "Segoe UI", Tahoma, sans-serif;
  background:#f4f7fb;
  color:#2d3748;
  max-width:1000px;
  margin:auto;
  padding:30px 20px;
}

h2{
  text-align:center;
  margin-bottom:25px;
  color:#4f46e5;
  font-size:32px;
  font-weight:700;
}

.q-title{
  color:#6366f1;
  font-size:16px;
  font-weight:700;
}

/* FORM TOP */

.top-panel{
  background:white;
  padding:20px;
  border-radius:16px;
  box-shadow:0 8px 25px rgba(0,0,0,.08);
  margin-bottom:25px;
}

label{
  font-weight:600;
}

input,
select{
  width:100%;
  padding:12px 15px;
  border:1px solid #dbe2ea;
  border-radius:10px;
  font-size:15px;
  margin-top:6px;
  margin-bottom:15px;
  transition:.2s;
}

input:focus,
select:focus{
  outline:none;
  border-color:#6366f1;
  box-shadow:0 0 0 4px rgba(99,102,241,.15);
}

/* BUTTON */

button{
  border:none;
  border-radius:12px;
  padding:12px 22px;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition:.25s;
  background:linear-gradient(
    135deg,
    #6366f1,
    #8b5cf6
  );
  color:white;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 20px rgba(99,102,241,.3);
}

/* QUIZ CARD */

.question{
  padding:12px 14px;
}

.audio-box{
  margin:10px 0;
  padding:10px;
  background:#eef2ff;
  border-radius:10px;
}

.audio-box audio{
  width:100%;
}

.question > div:nth-child(2){
  margin-bottom:6px;
}

/* Radio gọn hơn */
.question label{
  align-items:center;
  gap:6px;
  padding:4px 8px;
  margin-bottom:2px;
  line-height:1.3;
}

/* bỏ margin thừa của radio */
.question input[type="radio"]{
  margin:0;
  padding:0;
  width:auto;
}

/* bỏ khoảng cách ở đáp án cuối */
.question label:last-child{
  margin-bottom:0;
}

/* TEXT ANSWER */

.question input[type="text"],
.question input:not([type]){
  margin-top:10px;
}

/* RESULT */

.correct{
  margin-top:12px;
  background:#ecfdf5;
  color:#059669;
  padding:10px 14px;
  border-radius:10px;
  font-weight:700;
}

.wrong{
  margin-top:12px;
  background:#fef2f2;
  color:#dc2626;
  padding:10px 14px;
  border-radius:10px;
  font-weight:700;
}

/* HR */

hr{
  border:none;
  height:1px;
  background:#e5e7eb;
  margin:25px 0;
}

/* SUBMIT BUTTON */

.submit-wrap{
  text-align:center;
  margin:30px 0;
}

.submit-wrap button{
  min-width:220px;
  font-size:17px;
}

#toast{
  position:fixed;
  top:20px;
  right:20px;
  z-index:9999;
}

.toast{
  min-width:280px;
  padding:14px 18px;
  border-radius:12px;
  color:white;
  font-weight:600;
  margin-bottom:10px;
  box-shadow:0 8px 25px rgba(0,0,0,.15);

  animation:slideIn .3s ease;
}

.toast-success{
  background:#10b981;
}

.toast-error{
  background:#ef4444;
}

@keyframes slideIn{
  from{
    opacity:0;
    transform:translateX(50px);
  }
  to{
    opacity:1;
    transform:translateX(0);
  }
}
.login-row{
  display:flex;
  gap:15px;
  align-items:flex-end;
  margin-bottom:15px;
}

.field{
  flex:1;
}

.field label{
  display:block;
  margin-bottom:6px;
}

.field input{
  width:100%;
  margin-bottom:0;
}

.login-btn-wrap{
  flex:none;
}

.login-btn-wrap button{
  height:48px;
  white-space:nowrap;
}

@media(max-width:700px){

  .login-row{
    flex-direction:column;
    align-items:stretch;
  }

  .login-btn-wrap button{
    width:100%;
  }

}
.password-box{
  position:relative;
}

.password-box input{
  width:100%;
  padding-right:45px;
}

.toggle-password{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  font-size:18px;
  user-select:none;
}

.ranking-card{
  width:700px;
  max-width:95%;
  max-height:85vh;

  overflow:auto;

  background:white;

  margin:40px auto;

  border-radius:20px;

  padding:20px;

  box-shadow:
  0 20px 60px rgba(0,0,0,.25);
}

.ranking-header{
  display:flex;
  justify-content:space-between;
  align-items:center;

  margin-bottom:20px;
}

.ranking-table{
  width:100%;
  border-collapse:collapse;
}

.ranking-table th,
.ranking-table td{
  padding:12px;
  border-bottom:1px solid #eee;
  text-align:center;
}

.ranking-table th{
  background:#f5f7ff;
}

.rank-1{
  background:
  linear-gradient(
    90deg,
    #fff7cc,
    #ffe082
  );

  font-weight:700;
  font-size:18px;
}

.rank-2{
  background:#f3f4f6;
}

.rank-3{
  background:#fef3c7;
}

/* =========================
   POPUP BACKDROP
========================= */
#registerModal{
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 1000;

  justify-content: center;
  align-items: center;
}

/* BOX */
.register-box{
  background: #fff;
  width: 320px;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
}

/* INPUT */
.register-box input{
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border: 1px solid #ddd;
  border-radius: 6px;
  outline: none;
}

.register-box input:focus{
  border-color: #6366f1;
}

/* =========================
   BUTTON CENTER
========================= */
.btn-group{
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-top: 15px;
}

.btn-group button{
  padding: 10px 14px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
  color: white;
  background: #6366f1;
  transition: 0.2s;
}

.btn-group button:hover{
  transform: translateY(-2px);
}

.btn-group button:last-child{
  background: #ef4444;
}

/* =========================
   SPINNER FULL SCREEN
========================= */
/* LOADING SPINNER */
.spinner {
  border: 4px solid #eee;
  border-top: 4px solid #6366f1;
  border-radius: 50%;
  width: 35px;
  height: 35px;
  animation: spin 0.8s linear infinite;
  margin:10px auto;
  display:none;
}

@keyframes spin {
  0% { transform: rotate(0deg);}
  100% { transform: rotate(360deg);}
}

.hidden{
  display:none;
}
</style>
</head>

<div id="adminPanel" style="

<!-- IMPORT DATA -->
<script src="data.js"></script>

<script>
let viewData = [];
let resultData = [];
let sortState = {
  key: "",
  asc: true
};

document.addEventListener("keydown", (e) => {

  // không chạy nếu đang nhập trong input / textarea / select
  const tag = document.activeElement.tagName;
  if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;

  if (e.ctrlKey && e.shiftKey && e.code === "KeyH") {
    e.preventDefault();
    openAdmin();
  }
});

async function openAdmin(){

  document.getElementById("adminPanel")
    .style.display = "block";

  await loadScores();

}

function togglePassword(){

  const pass =
    document.getElementById("password");

  const eye =
    document.querySelector(".toggle-password");

  if(pass.type === "password"){

    pass.type = "text";
    eye.textContent = "🚫️";

  }else{

    pass.type = "password";
    eye.textContent = "👁️	";

  }

}

function closeAdmin(){

  document.getElementById("adminPanel")
    .style.display = "none";

}

async function loadScores(){

  try{

    const url =
      "https://opensheet.elk.sh/1CuQMGYyWdZKb8XItQgLTbylPuRY73RPGBCPa1E6i8TY/1";

    const res = await fetch(url);

resultData = await res.json();
viewData = resultData;
renderTable(viewData);

    showToast("✔ Đã tải dữ liệu","success");

  }catch(err){

    console.error(err);

    showToast("✘ Load lỗi","error");

  }

}

function renderTable(data){

let html=`
<table border="1"
style="
width:100%;
border-collapse:collapse;
">

<thead>

<tr>
<th onclick="sortTable('Thời gian')">
Thời gian ${getArrow('Thời gian')}
</th>

<th onclick="sortTable('Họ tên')">
Họ tên ${getArrow('Họ tên')}
</th>

<th onclick="sortTable('Điểm')">
Điểm ${getArrow('Điểm')}
</th>

<th onclick="sortTable('Bài làm')">
Bài làm ${getArrow('Bài làm')}
</th>
</tr>

<tr>

<th>
<input
id="fTime"
value="${document.getElementById('fTime')?.value || ''}"
placeholder="Lọc"
oninput="filterTable()">
</th>

<th>
<input
id="fName"
value="${document.getElementById('fName')?.value || ''}"
placeholder="Lọc">
</th>

<th>
<input
id="fScore"
value="${document.getElementById('fScore')?.value || ''}"
placeholder="Lọc">
</th>

<th>
<input
id="fLesson"
value="${document.getElementById('fLesson')?.value || ''}"
placeholder="Lọc">
</th>

</tr>

<th colspan="4">


</thead>

<tbody>
`;

data.forEach(r=>{

html+=`
<tr>
<td>${r["Thời gian"]||""}</td>
<td>${r["Họ tên"]||""}</td>
<td>${r["Điểm"]||""}</td>
<td>${r["Bài làm"]||""}</td>
</tr>
`;

});

html+=`
</tbody>
</table>
`;

document.getElementById("tableInfo").innerHTML =
`📊 Đang hiển thị ${data.length} / ${resultData.length} dòng`;
document.getElementById("resultTable").innerHTML =
html;

}

function resetFilter(){

  document.getElementById("fTime").value="";
  document.getElementById("fName").value="";
  document.getElementById("fScore").value="";
  document.getElementById("fLesson").value="";

  viewData = [...resultData];

  renderTable(viewData);
}

function getArrow(key){

  if(sortState.key !== key) return "⬍";

  return sortState.asc ? "⬆" : "⬇";
}
function sortTable(key){

  if(sortState.key === key){
    sortState.asc = !sortState.asc;
  }else{
    sortState.key = key;
    sortState.asc = true;
  }

  viewData.sort((a,b)=>{

    let x = a[key] || "";
    let y = b[key] || "";

    const isNumber = !isNaN(x) && !isNaN(y);

    if(isNumber){
      x = Number(x);
      y = Number(y);
    }else{
      x = x.toString().toLowerCase();
      y = y.toString().toLowerCase();
    }

    if(x < y) return sortState.asc ? -1 : 1;
    if(x > y) return sortState.asc ? 1 : -1;
    return 0;
  });

  renderTable(viewData);
}

function filterTable(){

const fTime =
document.getElementById("fTime").value.toLowerCase();

const fName =
document.getElementById("fName").value.toLowerCase();

const fScore =
document.getElementById("fScore").value.toLowerCase();

const fLesson =
document.getElementById("fLesson").value.toLowerCase();

let filtered = resultData.filter(r=>{

return (
String(r["Thời gian"]||"").toLowerCase().includes(fTime) &&
String(r["Họ tên"]||"").toLowerCase().includes(fName) &&
String(r["Điểm"]||"").toLowerCase().includes(fScore) &&
String(r["Bài làm"]||"").toLowerCase().includes(fLesson)
);

});

// 🔥 GIỮ SORT NẾU ĐÃ CLICK CỘT
if(sortState.key){

filtered.sort((a,b)=>{

let x = a[sortState.key] || "";
let y = b[sortState.key] || "";

const isNumber = !isNaN(x) && !isNaN(y);

if(isNumber){
x = Number(x);
y = Number(y);
}else{
x = x.toString().toLowerCase();
y = y.toString().toLowerCase();
}

if(x < y) return sortState.asc ? -1 : 1;
if(x > y) return sortState.asc ? 1 : -1;
return 0;

});

}

viewData = filtered;
renderTable(viewData);
}

// ======================
// shuffle
// ======================
function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

let current=[];

// ======================
// STUDENTS
// ======================


const nameInput = document.getElementById("name");
const quizPanel = document.getElementById("quizPanel");
const toastBox = document.getElementById("toast");
const submitWrap = document.getElementById("submitWrap");

function isValidStudent(name, password){

if(!userList || userList.length === 0){
  alert("Chưa load danh sách user. Bấm F5 hoặc đợi 2 giây");
  return false;
}

  return userList.some(u =>
    (u.username || "").toLowerCase().trim() === name.toLowerCase().trim()
    &&
    (u.password || "").trim() === password.trim()
  );
}

async function loginStudent(){

  const name =
    document.getElementById("name").value.trim();

  const password =
    document.getElementById("password").value.trim();

  if(!name || !password){
    showToast("Nhập tên và mật khẩu", "error");
    return;
  }

  try {

    // 🔥 LOAD USER TỪ GOOGLE SHEET MỖI LẦN LOGIN
    const url =
      "https://opensheet.elk.sh/1CuQMGYyWdZKb8XItQgLTbylPuRY73RPGBCPa1E6i8TY/2"; 
      // ⚠️ nhớ thay đúng sheet USER nếu khác tab

    const res = await fetch(url);
    const users = await res.json();

    // 🔥 tìm user
    const found = users.find(u =>
      (u.username || "").trim().toLowerCase() === name.toLowerCase() &&
      (u.password || "").trim() === password
    );

    if(found){

      quizPanel.style.display = "block";

      showToast("✔ Đăng nhập thành công", "success");

    } else {

      quizPanel.style.display = "none";
      submitWrap.style.display = "none";

      showToast("✘ Sai tên hoặc mật khẩu", "error");
    }

  } catch(err){
    console.error(err);
    showToast("Lỗi kết nối dữ liệu user", "error");
  }
}

// ======================
// AUTO LOAD UNIT + LESSON
// ======================
const unitSel=document.getElementById("unit");
const lessonSel=document.getElementById("lesson");

// load unit từ data.js
function loadUnits(){
  unitSel.innerHTML="";

  Object.keys(bank).forEach(u=>{
    unitSel.innerHTML += `<option value="${u}">${u.toUpperCase()}</option>`;
  });
}

// load lesson theo unit
function loadLessons(unit){
  lessonSel.innerHTML="";

  Object.keys(bank[unit]).forEach(l=>{
    lessonSel.innerHTML += `<option value="${l}">${l.toUpperCase()}</option>`;
  });
}

// init
loadUnits();
loadLessons(Object.keys(bank)[0]);

// đổi unit => đổi lesson
unitSel.onchange = ()=>{
  loadLessons(unitSel.value);
};

// ======================
// LOAD QUIZ
// ======================
function loadQuiz(){

const studentName = nameInput.value.trim();

const password =
  document.getElementById("password").value.trim();

if(!isValidStudent(studentName, password)){
    alert("Tên không hợp lệ");
    return;
  }

  document.getElementById("quiz").innerHTML = "";
  submitWrap.style.display = "none";

  const u=unitSel.value;
  const l=lessonSel.value;

  current = JSON.parse(JSON.stringify(bank[u][l]));

  shuffle(current);

  current.forEach(q=>{

    if(
      q.type==="radio" ||
      q.type==="audio"
    ){
      shuffle(q.answers);
    }

  });

  render();

  submitWrap.style.display = "block";
}

// ======================
// RENDER
// ======================
function render(){

  const quiz=document.getElementById("quiz");
  quiz.innerHTML="";

  current.forEach((q,i)=>{

    let div=document.createElement("div");
    div.className="question";
    div.id="box"+i;

    let html=`<div class="q-title">Câu ${i+1}</div><div>${q.title}</div>`;

    if(q.type==="radio"){

  q.answers.forEach(a=>{
    html+=`
      <label>
        <input type="radio"
               name="${q.name}"
               value="${a.value}">
        ${a.text}
      </label><br>
    `;
  });

}

else if(q.type==="audio"){

  html+=`
    <div class="audio-box">
      <audio controls>
        <source src="${q.audio}" type="audio/mpeg">
      </audio>
    </div>
  `;

  q.answers.forEach(a=>{
    html+=`
      <label>
        <input type="radio"
               name="${q.name}"
               value="${a.value}">
        ${a.text}
      </label><br>
    `;
  });

}

else if(q.type==="audio-input"){

  html+=`
    <div class="audio-box">
      <audio controls>
        <source src="${q.audio}" type="audio/mpeg">
      </audio>
    </div>

    <input id="${q.id}"
           placeholder="Nhập từ bạn nghe được">
  `;

}

else{

  html+=`
    <input id="${q.id}">
  `;

}

    div.innerHTML=html;
    quiz.appendChild(div);
  });
}

// ======================
// GET RADIO
// ======================
function getRadio(n){
  const c=document.querySelector(`input[name="${n}"]:checked`);
  return c?c.value:"";
}


// ======================
// SUBMIT
// ======================
function submitQuiz(){

  const studentName=nameInput.value.trim();
  const unit = unitSel.value;
  const lesson = lessonSel.value;

  const password =
  document.getElementById("password").value.trim();

if(!isValidStudent(studentName, password)){
    alert("Tên không hợp lệ");
    return;
  }

  let d=0;

  current.forEach((q,i)=>{

    let ok=false;

if(
  q.type==="radio" ||
  q.type==="audio"
){

  ok = (
    getRadio(q.name) === q.correct
  );

}
else{

  ok = (
    document
      .getElementById(q.id)
      .value
      .trim()
      .toLowerCase()
    ===
    q.correct.toLowerCase()
  );

}

    const box=document.getElementById("box"+i);

    const res=document.createElement("div");

    if(ok){
      d++;
      res.className="correct";
      res.innerText="✔ Đúng: "+q.correct;
    }else{
      res.className="wrong";
      res.innerText="✘ Đáp án: "+q.correct;
    }

    box.appendChild(res);
  });

  const diem=Math.round((d/current.length)*10*10)/10;

  alert("Điểm: "+diem);

  fetch("https://script.google.com/macros/s/AKfycbxwdsEAG2LVcYxHb6VuLErY9Ynqz0pxWW3U4tQwcXU9w3EJnhHe7ewW8_nSaiaLqRWoYg/exec",{
    method:"POST",
    body:JSON.stringify({
      name:studentName,
      answer:diem,
	  result: `${unit} - ${lesson}`
    })
  });
}



function showToast(text,type){

  const div=document.createElement("div");

  div.className=
    "toast " +
    (type==="success"
      ? "toast-success"
      : "toast-error");

  div.innerHTML=text;

  toastBox.appendChild(div);

  setTimeout(()=>{
    div.remove();
  },3000);

}

async function showRanking(){

  try{

    const url =
      "https://opensheet.elk.sh/1CuQMGYyWdZKb8XItQgLTbylPuRY73RPGBCPa1E6i8TY/1";

    const res = await fetch(url);
    const data = await res.json();

    const diem10 = data.filter(
      r => Number(r["Điểm"]) === 10
    );

    const ranking = {};

    diem10.forEach(r=>{

      const name =
        (r["Họ tên"] || "").trim();

      if(!name) return;

      ranking[name] =
        (ranking[name] || 0) + 1;

    });

    const arr = Object.entries(ranking)
      .map(([name,count])=>({
        name,
        count
      }))
      .sort((a,b)=>b.count-a.count);

    let html = `
    <table class="ranking-table">
      <tr>
        <th>Hạng</th>
        <th>Học sinh</th>
        <th>Số điểm 10</th>
      </tr>
    `;

    arr.forEach((r,i)=>{

      const cls =
        i===0 ? "rank-1" :
        i===1 ? "rank-2" :
        i===2 ? "rank-3" :
        "";

      const medal =
        i===0 ? "1 🥇" :
        i===1 ? "2 🥈" :
        i===2 ? "3 🥉" :
        (i+1);

      html += `
      <tr class="${cls}">
        <td>${medal}</td>
        <td>${i===0 ? "👑 " : ""}${r.name}</td>
        <td>${r.count}</td>
      </tr>
      `;
    });

    html += `</table>`;

    document.getElementById(
      "rankingContent"
    ).innerHTML = html;

    document.getElementById(
      "rankingModal"
    ).style.display = "block";

  }catch(err){

    console.error(err);

    showToast(
      "✘ Không tải được bảng xếp hạng",
      "error"
    );

  }

}

function closeRanking(){

  document.getElementById(
    "rankingModal"
  ).style.display = "none";

}

function register() {

  spinner.style.display = "block";

  const data = {
    type: "register",
    username: document.getElementById("username").value,
    password: document.getElementById("regPassword").value,
    phone: document.getElementById("phone").value,
    email: document.getElementById("email").value,
    address: document.getElementById("address").value
  };

  fetch("https://script.google.com/macros/s/AKfycbxwdsEAG2LVcYxHb6VuLErY9Ynqz0pxWW3U4tQwcXU9w3EJnhHe7ewW8_nSaiaLqRWoYg/exec", {
    method: "POST",

  })
  .then(r => r.text())
  .then(res => {

    alert("Đăng ký lỗi!");
  });
}
