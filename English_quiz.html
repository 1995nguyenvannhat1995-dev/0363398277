<script>
let viewData = [];
let resultData = [];
let sortState = {key: "",asc: true};
const API_URL ="https://script.google.com/macros/s/AKfycbxQlZMaeUEsMCF5jHJjNzlhAD6yMD8V93QpiPQdoqI1Ex71_Jx3utKWEFZatNJLo5s/exec";

  if(pass.type === "password"){

async function loadScores(){

  try{

    const url =
      "https://opensheet.elk.sh/1CuQMGYyWdZKb8XItQgLTbylPuRY73RPGBCPa1E6i8TY/1";

    const res = await fetch(url);

resultData = await res.json();
viewData = resultData;
renderTable(viewData);

  }catch(err){

    console.error(err);

    showToast("✘ Load lỗi","error");

}

function renderTable(data){

let html=`
<table border="1"
style="
width:100%;
border-collapse:collapse;
">

<thead>

<tr>
<th onclick="sortTable('Thời gian')">
Thời gian ${getArrow('Thời gian')}
</th>

<th onclick="sortTable('Họ tên')">
Họ tên ${getArrow('Họ tên')}
</th>

<th onclick="sortTable('Điểm')">
Điểm ${getArrow('Điểm')}
</th>

<th onclick="sortTable('Bài làm')">
Bài làm ${getArrow('Bài làm')}
</th>
</tr>

<tr>

<th>

<div style="display:flex;gap:6px;align-items:center;">

<input
type="date"
id="fDateFrom"
value="${document.getElementById('fDateFrom')?.value || ''}"
onchange="filterTable()"
title="Từ ngày">

<input
type="date"
id="fDateTo"
value="${document.getElementById('fDateTo')?.value || ''}"
onchange="filterTable()"
title="Đến ngày">

</div>

</th>

<th>
<input
id="fName"
value="${document.getElementById('fName')?.value || ''}"
placeholder="Lọc">
</th>

<th>
<input
id="fScore"
value="${document.getElementById('fScore')?.value || ''}"
placeholder="Lọc">
</th>

<th>
<input
id="fLesson"
value="${document.getElementById('fLesson')?.value || ''}"
placeholder="Lọc">
</th>

</tr>

<th colspan="4">


</thead>

<tbody>
`;

data.forEach(r=>{

html+=`
<tr>
<td>${r["Thời gian"]||""}</td>
<td>${r["Họ tên"]||""}</td>
<td>${r["Điểm"]||""}</td>
<td>${r["Bài làm"]||""}</td>
</tr>
`;

});

html+=`
</tbody>
</table>
`;

document.getElementById("tableInfo").innerHTML =
`📊 Đang hiển thị ${data.length} / ${resultData.length} dòng`;
document.getElementById("resultTable").innerHTML =
html;

}

function resetFilter(){

  document.getElementById("fDateFrom").value="";
document.getElementById("fDateTo").value="";
  document.getElementById("fName").value="";
  document.getElementById("fScore").value="";
  document.getElementById("fLesson").value="";

  viewData = [...resultData];

  renderTable(viewData);
}

function getArrow(key){

  if(sortState.key !== key) return "⬍";

  return sortState.asc ? "⬆" : "⬇";
}
function sortTable(key){

  if(sortState.key === key){
    sortState.asc = !sortState.asc;
  }else{
    sortState.key = key;
    sortState.asc = true;
  }

  viewData.sort((a,b)=>{

    let x = a[key] || "";
    let y = b[key] || "";

    const isNumber = !isNaN(x) && !isNaN(y);

    if(isNumber){
      x = Number(x);
      y = Number(y);
    }else{
      x = x.toString().toLowerCase();
      y = y.toString().toLowerCase();
    }

    if(x < y) return sortState.asc ? -1 : 1;
    if(x > y) return sortState.asc ? 1 : -1;
    return 0;
  });

  renderTable(viewData);
}

function parseVNDate(str){

  if(!str) return null;

  const [datePart,timePart] = str.split(" ");

  const [d,m,y] = datePart.split("/");

  return new Date(
    Number(y),
    Number(m)-1,
    Number(d)
  );
}

function filterTable(){

const dateFrom =
document.getElementById("fDateFrom")?.value || "";

const dateTo =
document.getElementById("fDateTo")?.value || "";

const fName =
document.getElementById("fName").value.toLowerCase();

const fScore =
document.getElementById("fScore").value.toLowerCase();

const fLesson =
document.getElementById("fLesson").value.toLowerCase();

let filtered = resultData.filter(r=>{

const timeText =
String(r["Thời gian"] || "");

let passDate = true;

if(dateFrom || dateTo){

const rowDate =
parseVNDate(timeText);
console.log(
  timeText,
  rowDate
);

if(dateFrom){

const startDate = new Date(dateFrom);

startDate.setDate(
  startDate.getDate() - 1
);

passDate =
passDate &&
rowDate >= startDate;

}
if(dateTo){

const endDate =
new Date(dateTo);

endDate.setHours(
23,59,59,999
);

passDate =
passDate &&
rowDate <= endDate;
}

}

return (

passDate &&

String(r["Họ tên"]||"")
.toLowerCase()
.includes(fName)

&&

String(r["Điểm"]||"")
.toLowerCase()
.includes(fScore)

&&

String(r["Bài làm"]||"")
.toLowerCase()
.includes(fLesson)

);

});

if(sortState.key){

filtered.sort((a,b)=>{

let x = a[sortState.key] || "";
let y = b[sortState.key] || "";

const isNumber =
!isNaN(x) &&
!isNaN(y);

if(isNumber){

x = Number(x);
y = Number(y);

}else{

x = x.toString().toLowerCase();
y = y.toString().toLowerCase();

}

if(x < y)
return sortState.asc ? -1 : 1;

if(x > y)
return sortState.asc ? 1 : -1;

return 0;

});

}

viewData = filtered;

renderTable(viewData);

}

// ======================
// shuffle

function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

if (found) {

 else {

function render(){

  html += `
    <div class="audio-box">
      <audio controls>
        <source src="${q.audio}" type="audio/mpeg">

  `;

    if (q.image) {
      html += `

        </div>
      `;
    }

    // =========================
    // QUESTION TYPE (ONLY 2)
    // =========================

const qName = q.name || q.id;

if (q.type === "radio") {

  q.answers.forEach(a => {
html += `
<label class="answer-item">
  <input type="radio"
         name="${qName}"
         value="${a.value}">
  <span>${a.text}</span>
</label>
`;
  });

} 
else if (q.type === "checkbox") {

  q.answers.forEach(a => {
html += `
<label class="answer-item">
    <input
        type="checkbox"
        name="${qName}"
        value="${a.value}">
    <span>${a.text}</span>
</label>
`;

else {

    <input id="${q.id}" placeholder="Nhập đáp án">
  `;
}

  });
}

// ======================
// GET RADIO
// ======================
function getRadio(n){
  const c=document.querySelector(`input[name="${n}"]:checked`);
  return c?c.value:"";
}


function getCorrectAnswerText(q){

  if(!q.answers) return q.correct;

  // checkbox
  if(Array.isArray(q.correct)){

    return q.answers
      .filter(a => q.correct.includes(a.value))
      .map(a => a.text)
      .join(", ");
  }

  // radio
  const found =
    q.answers.find(
      a => a.value === q.correct
    );

  return found
    ? found.text
    : q.correct;
}

// ======================
// Kiểm tra
// ======================
function validateAndSubmit(){

  // reset lỗi cũ
  document.querySelectorAll(".question")
    .forEach(q=>{
      q.style.border = "";
      q.style.background = "";
    });

  // =====================
  // BƯỚC 1:
  // KIỂM TRA CHƯA LÀM
  // =====================

  const notAnswered = [];

  current.forEach((q,index)=>{

    const qName = q.name || q.id;
    const box = document.getElementById("box"+index);

    let empty = false;

    if(q.type === "radio"){

      const checked =
        document.querySelector(
          `input[name="${qName}"]:checked`
        );

      empty = !checked;
    }
    else if(q.type === "checkbox"){

      const checked =
        document.querySelectorAll(
          `input[name="${qName}"]:checked`
        );

      empty = checked.length === 0;
    }
    else{

      const value =
        document
          .getElementById(q.id)
          .value
          .trim();

      empty = !value;
    }

    if(empty){

      notAnswered.push(index+1);

      box.style.border = "2px solid #ef4444";
      box.style.borderRadius = "12px";
      box.style.background = "#fef2f2";
    }

  });

  if(notAnswered.length){

    alert(
      "Bạn chưa làm câu:\n" +
      notAnswered.join(", ")
    );

    document
      .getElementById(
        "box" + (notAnswered[0]-1)
      )
      .scrollIntoView({
        behavior:"smooth",
        block:"center"
      });

    return;
  }

  // =====================
  // BƯỚC 2:
  // KIỂM TRA DẤU CÂU
  // =====================

  const noPunctuation = [];

  current.forEach((q,index)=>{

    // chỉ kiểm tra câu nhập text
    if(
      q.type === "radio" ||
      q.type === "checkbox"
    ){
      return;
    }

    const value =
      document
        .getElementById(q.id)
        .value
        .trim();

    const hasEndMark =
      /(\.\.\.|[.!?])$/.test(value);

    if(!hasEndMark){

      noPunctuation.push(index+1);

      const box =
        document.getElementById(
          "box"+index
        );

      box.style.border =
        "2px solid orange";

      box.style.borderRadius =
        "12px";

      box.style.background =
        "#fff7ed";
    }

  });

  if(noPunctuation.length){

    alert(
      "Thiếu dấu kết thúc câu:\n" +
      noPunctuation.join(", ")
    );

    document
      .getElementById(
        "box" + (noPunctuation[0]-1)
      )
      .scrollIntoView({
        behavior:"smooth",
        block:"center"
      });

    return;
  }

  // =====================
  // OK
  // =====================

  submitQuiz();
}

function submitQuiz(){

  const studentName=nameInput.value.trim();
  const unit = unitSel.value;
  const lesson = lessonSel.value;

  const password =
  document.getElementById("password").value.trim();

if(!isValidStudent(studentName, password)){
    alert("Tên không hợp lệ");
    return;
  }

  let d=0;

current.forEach((q,i)=>{

  let ok = false;

if (q.type === "radio") {

  ok = (getRadio(q.name || q.id) === q.correct);

} 
else if (q.type === "checkbox") {

const selected = Array.from(
  document.querySelectorAll(`input[name="${q.name || q.id}"]:checked`)
).map(el => el.value);

  const correct = q.correct || [];

  ok =
    selected.length === correct.length &&
    selected.every(v => correct.includes(v));

} 
else {

  const user =
    document.getElementById(q.id).value.trim().toLowerCase();

  ok = (user === (q.correct || "").toLowerCase());
}

  const box = document.getElementById("box" + i);

  const res = document.createElement("div");

const correctText =
  getCorrectAnswerText(q);

if (ok) {

  d++;

  res.className = "correct";

  res.innerText =
    "✔ Đáp án đúng: " + correctText;

} else {

  res.className = "wrong";

  res.innerText =
    "✘ Đáp án đúng: " + correctText;
}

  box.appendChild(res);
});

async function showRanking(){

  try{

    const url =
      "https://opensheet.elk.sh/1CuQMGYyWdZKb8XItQgLTbylPuRY73RPGBCPa1E6i8TY/1";

    const res = await fetch(url);
    const data = await res.json();

    const diem10 = data.filter(
      r => Number(r["Điểm"]) === 10
    );

    const ranking = {};

    diem10.forEach(r=>{

      const name =
        (r["Họ tên"] || "").trim();

      if(!name) return;

      ranking[name] =
        (ranking[name] || 0) + 1;

    });

    const arr = Object.entries(ranking)
      .map(([name,count])=>({
        name,
        count
      }))
      .sort((a,b)=>b.count-a.count);

    let html = `
    <table class="ranking-table">
      <tr>
        <th>Hạng</th>
        <th>Học sinh</th>
        <th>Số điểm 10</th>
      </tr>
    `;

    arr.forEach((r,i)=>{

      const cls =
        i===0 ? "rank-1" :
        i===1 ? "rank-2" :
        i===2 ? "rank-3" :
        "";

      const medal =
        i===0 ? "1 🥇" :
        i===1 ? "2 🥈" :
        i===2 ? "3 🥉" :
        (i+1);

      html += `
      <tr class="${cls}">
        <td>${medal}</td>
        <td>${i===0 ? "👑 " : ""}${r.name}</td>
        <td>${r.count}</td>
      </tr>
      `;
    });

    html += `</table>`;

    document.getElementById(
      "rankingContent"
    ).innerHTML = html;

    document.getElementById(
      "rankingModal"
    ).style.display = "block";

  }catch(err){

    console.error(err);

    showToast(
      "✘ Không tải được bảng xếp hạng",
      "error"
    );

  }

}

function closeRanking(){

  document.getElementById(
    "rankingModal"
  ).style.display = "none";

}

/* REGISTER + LOADING */
async function register() {

  const loading = document.getElementById("loginLoading");
  const loadingText = loading.querySelector(".loading-text");

  const usernameEl = document.getElementById("username");
  const passwordEl = document.getElementById("regPassword");
  const phoneEl = document.getElementById("phone");
  const emailEl = document.getElementById("email");
  const addressEl = document.getElementById("address");

  const username = usernameEl.value.trim();
  const password = passwordEl.value.trim();
  const phone = phoneEl.value.trim();
  const email = emailEl.value.trim();
  const address = addressEl.value.trim();

  // reset lỗi
  [usernameEl, passwordEl, phoneEl, emailEl, addressEl]
    .forEach(clearError);

  let hasError = false;

  // ======================
  // CHECK RỖNG
  // ======================
  if (!username) { markError(usernameEl); hasError = true; }
  if (!password) { markError(passwordEl); hasError = true; }
  if (!phone) { markError(phoneEl); hasError = true; }
  if (!email) { markError(emailEl); hasError = true; }
  if (!address) { markError(addressEl); hasError = true; }

  if (hasError) {
    alert("❌ Không được để trống thông tin");
    return;
  }

  // ======================
  // CHECK PHONE
  // ======================
  const phoneRegex = /^[0-9]{10,11}$/;
  if (!phoneRegex.test(phone)) {
    markError(phoneEl);
    alert("❌ Số điện thoại phải 10–11 số");
    return;
  }

  // ======================
  // CHECK EMAIL
  // ======================
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!emailRegex.test(email)) {
    markError(emailEl);
    alert("❌ Email không hợp lệ");
    return;
  }

  // ======================
  // LOADING
  // ======================
  loadingText.textContent = "Đang tạo tài khoản...";
  loading.style.display = "flex";

  try {

    const data = {
      type: "register",
      username,
      password,
      phone,
      email,
      address
    };

    const res = await fetch(
      "https://script.google.com/macros/s/AKfycbxwdsEAG2LVcYxHb6VuLErY9Ynqz0pxWW3U4tQwcXU9w3EJnhHe7ewW8_nSaiaLqRWoYg/exec",
      {
        method: "POST",
        body: JSON.stringify(data)
      }
    );

    const result = await res.json();

    // ======================
    // HANDLE RESPONSE
    // ======================
    if (!result.success) {

      if (result.message === "USERNAME_EXISTS") {
        markError(usernameEl);
        alert("❌ Tên tài khoản đã tồn tại, vui lòng chọn tên khác.");
      } else {
        alert("❌ Đăng ký thất bại, thử lại sau.");
      }

      return;
    }

    // ======================
    // SUCCESS
    // ======================
    alert(
  "✔ Đăng ký thành công!\n" +
  "⏳ Dữ liệu đang được cập nhật.\n" +
  "Bạn có thể đăng nhập sau 5 phút."
);

    closeRegister();

    // clear form
    usernameEl.value = "";
    passwordEl.value = "";
    phoneEl.value = "";
    emailEl.value = "";
    addressEl.value = "";

  } catch (err) {

    console.error(err);
    alert("❌ Lỗi kết nối server, thử lại sau");

  } finally {

    loading.style.display = "none";
    loadingText.textContent = "Đang đăng nhập...";

  }
}
