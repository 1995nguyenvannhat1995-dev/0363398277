<style>
*{
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#e3f2fd,#f5f7fa);
    margin:0;
    padding:20px;
    max-width:900px;
    margin:auto;
}

/* Tiêu đề */
h1{
    text-align:center;
    color:white;
    background:linear-gradient(135deg,#2196f3,#1565c0);
    padding:18px;
    border-radius:18px;
    box-shadow:0 8px 20px rgba(0,0,0,.15);
    margin-bottom:25px;
}

/* Bài học */
details.level1{
    margin-bottom:12px;
}

details.level1 > summary{
    background:linear-gradient(135deg,#2196f3,#1976d2);
    color:white;
    padding:16px 20px;
    border-radius:14px;
    cursor:pointer;
    font-size:20px;
    font-weight:700;
    box-shadow:0 5px 15px rgba(33,150,243,.3);
    transition:.25s;
}

details.level1 > summary:hover{
    transform:translateY(-2px);
}

/* Phần */
details.level2{
    margin:10px 0 10px 18px;
}

details.level2 > summary{
    background:linear-gradient(135deg,#4caf50,#2e7d32);
    color:white;
    padding:13px 18px;
    border-radius:12px;
    cursor:pointer;
    font-size:17px;
    font-weight:600;
    box-shadow:0 4px 12px rgba(76,175,80,.25);
}

/* VIDEO BOX */
.video-box{
    margin:15px 0 15px 18px;
    background:white;
    border-radius:16px;
    padding:12px;
    box-shadow:0 6px 18px rgba(0,0,0,.12);
}

.video-box iframe{
    width:100%;
    aspect-ratio:16/9;
    border:none;
    border-radius:12px;
}

/* Nhóm nút */
.buttons{
    margin:15px 0 15px 40px;
    display:flex;
    flex-wrap:wrap;
    gap:12px;
}

/* Nút cấp 3 */
.buttons button{
    min-width:140px;
    padding:14px 20px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#ff9800,#f57c00);
    color:white;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(255,152,0,.35);
    transition:all .25s ease;
}

.buttons button:hover{
    transform:translateY(-3px) scale(1.03);
    box-shadow:0 8px 20px rgba(255,152,0,.45);
}

.buttons button:active{
    transform:scale(.96);
}

/* Mobile */
@media(max-width:600px){
    .buttons{
        margin-left:20px;
    }

    .buttons button{
        width:100%;
    }
}
.video-btn{
    margin:15px 0 10px 18px;
    padding:12px 18px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#e53935,#c62828);
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(229,57,53,.3);
    transition:.2s;
}

.video-btn:hover{
    transform:scale(1.03);
}

.video-box{
    margin:10px 0 15px 18px;
    background:white;
    border-radius:16px;
    padding:12px;
    box-shadow:0 6px 18px rgba(0,0,0,.12);
    display:none; /* 👈 ẨN MẶC ĐỊNH */
}

.video-box iframe{
    width:100%;
    aspect-ratio:16/9;
    border:none;
    border-radius:12px;
}
.flip-btn{
    display:inline-block;
    margin:15px auto 20px auto;
    padding:14px 22px;
    background:linear-gradient(135deg,#ff9800,#f57c00);
    color:white;
    font-size:16px;
    font-weight:bold;
    border:none;
    border-radius:100px;
    cursor:pointer;
    box-shadow:0 6px 18px rgba(255,152,0,.35);
    transition:.25s;
}

.flip-btn:hover{
    transform:translateY(-2px) scale(1.03);
}

.flip-btn:active{
    transform:scale(0.97);
}
</style>

<script>
// lưu trạng thái mở
document.querySelectorAll("details[id]").forEach(item => {
    const state = localStorage.getItem(item.id);
    if(state === "true"){
        item.open = true;
    }

    item.addEventListener("toggle", () => {
        localStorage.setItem(item.id, item.open);
    });
});
function toggleVideo(id){
    const box = document.getElementById(id);
    if(box.style.display === "block"){
        box.style.display = "none";
    }else{
        box.style.display = "block";
    }
}
