<script>
const synonymGroups = [
  ["bầu", "thai"],
  ["tiểu đường", "đái tháo đường"],
  ["biếng ăn", "lười ăn", "chán ăn", "kén ăn", "chậm ăn", "ăn chậm","thèm ăn", "ngon miệng", "kích thích ăn uống"]
];
const drugs = window.drugs || [];
let currentDrug = null;
let panelOpen = false;

const fieldLabels = {
active:"Hoạt chất", dose:"Hàm lượng", form:"Dạng bào chế", group:"Nhóm thuốc",
rx:"Phân loại", storage:"Bảo quản", dosage:"Liều dùng", indication:"Chỉ định",
contra:"Chống chỉ định", caution:"Thận trọng", origin:"Xuất xứ"
};

document.getElementById("search").addEventListener("keydown", function(e){

  if(e.key === "Enter"){

    // 🔥 đóng danh sách gợi ý trước
    document.getElementById("suggestions").innerHTML = "";

    // nếu muốn ẩn hẳn box:
    // document.getElementById("suggestions").style.display = "none";

    // tiếp tục chức năng Enter
    showSearchResults(this.value);
  }
});


function normalizeKeyword(text){
  text = (text || "").toLowerCase().trim();

  for(let group of synonymGroups){
    if(group.includes(text)){
      // đổi tất cả từ trong nhóm về từ đầu tiên
      return group[0];
    }
  }

  return text;
}


function showSearchResults(keyword){
console.trace("SHOW SEARCH RESULTS CALLED");

  keyword = normalizeKeyword(keyword);

  let box = document.getElementById("searchResults");
  box.innerHTML = "";

  let results = [];
  let exactResults = [];

  // =========================
  // 1. KHÔNG keyword => show ALL
  // =========================
  if(!keyword){
    results = [...drugs];
  } 
  else {

    // =========================
    // 2. tìm exact/contains
    // =========================
exactResults = drugs.filter(d => {
let name = normalizeKeyword(d.name);
let active = normalizeKeyword(d.active);
let indication = normalizeKeyword(d.indication);
let ms = (d.MS || "").toLowerCase();

  return (
    name.includes(keyword) ||
    active.includes(keyword) ||
    indication.includes(keyword) ||
    ms.includes(keyword)
  );
});

    // =========================
    // 3. nếu có thì dùng luôn
    // =========================
    if(exactResults.length > 0){
      results = exactResults;
    } 
    // =========================
    // 4. không có thì fuzzy
    // =========================
    else {
      results = drugs.filter(d => {

        let name = (d.name || "").toLowerCase();
        let active = (d.active || "").toLowerCase();
        let indication = (d.indication || "").toLowerCase();

        return (
          fuzzyMatch(keyword, name) ||
          fuzzyMatch(keyword, active) ||
          fuzzyMatch(keyword, indication)
        );
      });
    }
  }

  // =========================
  // 5. SORT
  // =========================
  if(document.getElementById("sortByScore").checked){

    results.sort((a,b) =>
      (parseFloat(b.position) || 0) - (parseFloat(a.position) || 0)
    );

  } else {

    results.sort((a,b) =>
      (a.name || "").localeCompare(b.name || "", "vi")
    );
  }

  // =========================
  // 6. KHÔNG CÓ KẾT QUẢ
  // =========================
  if(results.length === 0){
    box.innerHTML = `
      <div style="
        padding:20px;
        background:#fff;
        border-radius:10px;
        border:1px solid #ddd;
      ">
        Không tìm thấy thuốc
      </div>
    `;
    box.style.display = "flex";
    return;
  }

  // =========================
  // 7. RENDER CARDS
  // =========================
  results.forEach(d => {

    let card = document.createElement("div");
    card.className = "search-card";

    card.innerHTML = `
      <img src="${d.IMG || ''}">
      <div class="search-info">
        <div class="search-name">${d.name}</div>
        <div>MS: ${d.MS || "Không có"}</div>
        <div class="search-score">⭐ ${d.position || "N/A"}</div>
      </div>
    `;

    card.onclick = () => selectDrug(d.name);
    box.appendChild(card);
  });

  // =========================
  // 8. BỘ ĐẾM SẢN PHẨM
  // =========================
  let countBox = document.getElementById("resultCount");

  countBox.innerHTML = `
   <b>${results.length}</b> sản phẩm
  `;
}



function toggleClearBtn(){
  const input = document.getElementById("search");
  const btn = document.getElementById("clearBtn");
  btn.style.display = input.value ? "block" : "none";
}

function clearSearch(){
  const input = document.getElementById("search");
  input.value = "";
  
  document.getElementById("suggestions").innerHTML = "";
  document.getElementById("result").innerText = "";
  document.getElementById("altListBox").style.display = "none";

  currentDrug = null;

  toggleClearBtn();
}

function filterGroup(){
  let g = document.getElementById("groupFilter").value;
  let list = document.getElementById("drugList");
  list.innerHTML = "";

  let filtered = drugs.filter(d => d.group == g);

  // 🔥 sort theo hoạt chất → hàm lượng
  filtered.sort((a, b) => {
    // 1. so sánh hoạt chất
    let activeCompare = (a.active || "").localeCompare(b.active || "", 'vi');
    if (activeCompare !== 0) return activeCompare;

    // 2. so sánh hàm lượng (chuyển về số)
    let doseA = parseFloat(a.dose) || 0;
    let doseB = parseFloat(b.dose) || 0;
    return doseA - doseB;
  });

  filtered.forEach(d => {
    let li = document.createElement("li");
    li.innerText = d.name;
    li.onclick = () => selectDrug(d.name);
    list.appendChild(li);
  });
}

function levenshtein(a, b){
  const matrix = [];

  for(let i=0; i<=b.length; i++){ matrix[i] = [i]; }
  for(let j=0; j<=a.length; j++){ matrix[0][j] = j; }

  for(let i=1; i<=b.length; i++){
    for(let j=1; j<=a.length; j++){
      if(b.charAt(i-1) === a.charAt(j-1)){
        matrix[i][j] = matrix[i-1][j-1];
      } else {
        matrix[i][j] = Math.min(
          matrix[i-1][j-1] + 1,
          matrix[i][j-1] + 1,
          matrix[i-1][j] + 1
        );
      }
    }
  }

  return matrix[b.length][a.length];
}

function fuzzyMatch(input, target){
  input = input.toLowerCase();
  target = target.toLowerCase();

  // nếu chứa luôn thì ok
  if(target.includes(input)) return true;

  // tách từ
  let words = target.split(/[\s,+()-]+/);

  for(let w of words){
    if(!w) continue;

    let dist = levenshtein(input, w);

    // 🔥 cho phép sai ~40% độ dài
    let threshold = Math.ceil(w.length * 0.4);

    if(dist <= threshold){
      return true;
    }
  }

  return false;
}

function suggest(){
  let text = document.getElementById("search").value.toLowerCase().trim();
  let box = document.getElementById("suggestions");
  box.innerHTML = "";

  if(!text) return;

  // ✅ exact match
  let exact = drugs.find(d => d.name.toLowerCase() === text);
  if(exact){
    currentDrug = exact;
    showField(currentDrug, "active");
    updateAlt();
  }

  let filtered = drugs
    .map(d => {
      let name = (d.name || "").toLowerCase();
      let active = (d.active || "").toLowerCase();

      let score = 999;

      // 🔹 match chuẩn
      if(name.startsWith(text)) score = 1;
      else if(name.includes(text)) score = 2;
      else if(active.startsWith(text)) score = 3;
      else if(active.includes(text)) score = 4;

      // 🔥 fuzzy
      else if(fuzzyMatch(text, name)) score = 5;
      else if(fuzzyMatch(text, active)) score = 6;

      return { drug: d, score };
    })
    .filter(x => x.score < 999)
    .sort((a,b)=>{
      if(a.score !== b.score) return a.score - b.score;
      return a.drug.name.localeCompare(b.drug.name,'vi');
    })
    .map(x => x.drug);

  filtered.forEach(d=>{
    let div = document.createElement("div");
    div.innerText = d.name;
    div.onclick = () => selectDrug(d.name);
    box.appendChild(div);
  });
}

function selectDrug(name){
  document.getElementById("search").value=name;
  document.getElementById("suggestions").innerHTML="";
  currentDrug = drugs.find(d=>d.name==name);
  document.getElementById("extraImageBox").style.display = "none";
  
    

  let btnDiv=document.getElementById("buttons"); 
  btnDiv.innerHTML="";

  Object.keys(fieldLabels).forEach(f=>{
    let b=document.createElement("button"); 
    b.innerText=fieldLabels[f];
    b.onclick=()=>showField(currentDrug,f);
    btnDiv.appendChild(b);
  });

  // ✅ hiển thị ảnh
  loadDrugImage(currentDrug);

  showField(currentDrug, "active");
  updateAlt();
}

function showField(drug,field){
  document.getElementById("result").innerHTML = `
    <b>⭐</b> ${drug.position || "Không có"}<br><br>
    <b>${fieldLabels[field]}:</b><br>
    ${drug[field] || "Không có dữ liệu"}
  `;
}

function toggleAltPanel(e){
  e.stopPropagation();

  const panel = document.getElementById('altPanel');
  const listBox = document.getElementById('altListBox');

  const isOpen = window.getComputedStyle(panel).display !== "none";

  if(isOpen){
    panel.style.display = 'none';
    listBox.style.display = 'none';
  }else{
    panel.style.display = 'block';
    listBox.style.display = 'block';
    updateAlt();
  }
}

function closeAltPanel(){
  panelOpen = false;
  document.getElementById('altPanel').style.display = 'none';
  document.getElementById('altListBox').style.display = 'none';
}
function updateAlt(){
document.getElementById('altListBox').style.display = 'block';
  if(!currentDrug) return;
  let chkA=document.getElementById("chkActive").checked;
  let chkD=document.getElementById("chkDose").checked;
  let chkF=document.getElementById("chkForm").checked;
  let chkO=document.getElementById("chkOrigin").checked;

  let filtered = drugs.filter(d=>{
    if(d.name===currentDrug.name) return false;
    if(chkA && d.active!==currentDrug.active) return false;
    if(chkD && d.dose!==currentDrug.dose) return false;
    if(chkF && d.form!==currentDrug.form) return false;
    if(chkO && d.origin!==currentDrug.origin) return false;
    return true;
  });

  filtered.sort((a,b)=>a.name.localeCompare(b.name,'vi'));
  let list=document.getElementById("altList"); list.innerHTML="";
  filtered.forEach(d=>{
    let div=document.createElement("div"); div.className="alt-item";
    div.innerText=d.name; div.onclick=()=>selectDrug(d.name);
    list.appendChild(div);
  });
}

let groupList = [];

function init(){
  let groups = [...new Set(drugs.map(d=>d.group))];
  groups.sort((a,b)=>a.localeCompare(b,'vi'));
  groupList = groups;

  renderGroupDropdown(groups);

  // đóng dropdown nhóm
  document.addEventListener('click', (e)=>{
    if(!e.target.closest('.combo-box')){
      document.getElementById("groupDropdown").style.display="none";
    }
  });

  // đóng alt panel
  document.addEventListener('click', (e)=>{
    const wrap = document.getElementById('altWrap');
    if(!wrap.contains(e.target)){
      closeAltPanel();
    }
  });
  showSearchResults("");
}

function toggleGroupBox(){
  document.getElementById("groupDropdown").style.display="block";
}

function renderGroupDropdown(list){
  let box = document.getElementById("groupDropdown");
  box.innerHTML="";

  list.forEach(g=>{
    let div=document.createElement("div");
    div.innerText=g;
    div.onclick=()=>{
      document.getElementById("groupFilter").value=g;
      box.style.display="none";
      filterGroupCustom(g);
    };
    box.appendChild(div);
  });
}

function filterGroupCombo(){
  let text = document.getElementById("groupFilter").value.toLowerCase();

  let filtered = groupList.filter(g => g.toLowerCase().includes(text));
  renderGroupDropdown(filtered);
}

function filterGroupCustom(g){
  let list = document.getElementById("drugList");
  list.innerHTML = "";

  let filtered = drugs.filter(d => d.group == g);

  filtered.sort((a, b) => {
    let activeCompare = (a.active || "").localeCompare(b.active || "", 'vi');
    if (activeCompare !== 0) return activeCompare;

    let doseA = parseFloat(a.dose) || 0;
    let doseB = parseFloat(b.dose) || 0;
    return doseA - doseB;
  });

  filtered.forEach(d => {
    let li = document.createElement("li");
    li.innerText = d.name;
    li.onclick = () => selectDrug(d.name);
    list.appendChild(li);
  });
}

function loadDrugImage(drug){
  let img = document.getElementById("drugImage");
  let box = document.getElementById("drugImageBox");

  if(!drug || !drug.IMG){
    img.src = "";
    box.style.display = "none"; // ❌ không có link → ẩn
    return;
  }

  let testImg = new Image();
  testImg.src = drug.IMG;

  testImg.onload = function(){
    img.src = drug.IMG;
    box.style.display = "flex"; // ✅ có ảnh → hiện
  };

  testImg.onerror = function(){
    img.src = "";
    box.style.display = "none"; // ❌ link lỗi → ẩn
  };
}

  box.style.display = "block";

  // 👇 kéo xuống dưới
  setTimeout(()=>{
    box.scrollIntoView({ behavior:"smooth" });
  }, 100);
}

function copySearchText(){

  const btn = document.getElementById("copyBtn");

  // chưa chọn thuốc
  if(!currentDrug){

    btn.style.background = "#ff1744"; // đỏ lỗi
    btn.innerText = "✕";

    setTimeout(() => {
      btn.style.background = "#1976d2";
      btn.innerText = "📋";
    }, 3000);

    return;
  }

  // lấy mã MS
  let code = currentDrug.MS || "";

  // không có MS
  if(!code){

    btn.style.background = "#ff1744";
    btn.innerText = "✕";

    setTimeout(() => {
      btn.style.background = "#1976d2";
      btn.innerText = "📋";
    }, 3000);

    return;
  }

  // copy
  navigator.clipboard.writeText(code);

  // thành công
  btn.style.background = "#00c853";
  btn.innerText = "✔";

  setTimeout(() => {
    btn.style.background = "#1976d2";
    btn.innerText = "📋";
  }, 3000);
}

function toggleScore(){

function reSearch(){

}

const menuBtn = document.getElementById("floatingMenu");
const menuBox = document.getElementById("menuBox");

let dragging = false;
let moved = false;
let offsetX = 0;
let offsetY = 0;

/* Mở menu */
menuBtn.addEventListener("click", function(e){

    e.stopPropagation();

    menuBtn.style.display = "none";

    menuBox.style.display = "block";

    menuBox.style.animation = "menuShow .2s ease";

    document.getElementById("menuOverlay").style.display = "block";
});

function closeMenu(){

    menuBox.style.display = "none";

    document.getElementById("menuOverlay").style.display = "none";

    menuBtn.style.display = "flex";
}

function goPage(url){

    closeMenu();

    window.location.href = url;
}

/* Kéo thả */
menuBtn.addEventListener("touchstart", startDrag);
menuBtn.addEventListener("mousedown", startDrag);

function startDrag(e){

    dragging = true;
    moved = false;

    const touch = e.touches ? e.touches[0] : e;

    offsetX = touch.clientX - menuBtn.offsetLeft;
    offsetY = touch.clientY - menuBtn.offsetTop;
}

document.addEventListener("touchmove", drag);
document.addEventListener("mousemove", drag);

function drag(e){

    if(!dragging) return;

    moved = true;

    const touch = e.touches ? e.touches[0] : e;

    menuBtn.style.left = (touch.clientX - offsetX) + "px";
    menuBtn.style.top = (touch.clientY - offsetY) + "px";

    menuBtn.style.right = "auto";
    menuBtn.style.bottom = "auto";

    menuBox.style.display = "none";
}

document.addEventListener("touchend", ()=> dragging=false);
document.addEventListener("mouseup", ()=> dragging=false);

/* Bấm ngoài menu thì đóng */
document.addEventListener("click", function(e){

    if(
        menuBox.style.display === "block" &&
        !menuBtn.contains(e.target) &&
        !menuBox.contains(e.target)
    ){
        closeMenu();
    }

});



</script>
