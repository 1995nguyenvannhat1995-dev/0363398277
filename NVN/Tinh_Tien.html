<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tính tiền</title>

<style>
body{
    font-family:Arial;
    background:#f2f4f7;
    padding:20px;
    text-align:center;
}
.box{
    max-width:700px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,.1);
}
h2{margin-top:0;text-align:center;}
.target{
    width:95%;
    padding:15px;
    font-size:24px;
    margin-bottom:20px;
    border:2px solid #ccc;
    border-radius:10px;
    color:red;
    text-align:center;
    outline:none;
}
.row{
    display:grid;
    grid-template-columns:1fr 120px 1fr;
    gap:10px;
    align-items:center;
    justify-items:center;
    margin-bottom:12px;
    text-align:center;
}
.money{font-weight:bold;text-align:center;width:100%;}
.qty{
    width:120px;
    padding:10px;
    font-size:18px;
    text-align:center;
    border:2px solid #ccc;
    border-radius:10px;
    outline:none;
}
.total{
    font-weight:bold;
    color:#006400;
    text-align:center;
    width:100%;
    font-size:18px;
}
.final{
    margin-top:20px;
    padding:20px;
    border-radius:12px;
    background:#f8f8f8;
    text-align:center;
}
#grandTotal{
    font-size:32px;
    font-weight:bold;
    color:#d60000;
    text-align:center;
}
#compare{
    margin-top:10px;
    font-size:24px;
    font-weight:bold;
    text-align:center;
}
.ok{color:green;}
.low{color:red;}
.high{color:orange;}

@media(max-width:600px){
.row{grid-template-columns:1fr 100px 1fr;gap:5px;}
.money{font-size:14px;}
.qty{width:120px;font-size:16px;padding:8px;}
.total{font-size:14px;}
}
</style>
</head>
<body>

<div class="box">

<h2>💰 TÍNH TIỀN</h2>

<input
type="text"
id="target"
class="target"
placeholder="Nhập số tiền cần so sánh"
oninput="formatMoney(this); calculate();"
onblur="formatBlur(this);"
onfocus="unformat(this);"
>

<div id="list"></div>

<div class="row">
    <div class="money">PHẦN THÊM</div>

    <input
    type="text"
    id="extraMoney"
    class="qty"
    value="-500.000 VNĐ"
    oninput="formatMoney(this); calculate();"
    onblur="formatBlur(this);"
    onfocus="unformat(this);"
    >

    <div class="total" id="extraTotal">0 VNĐ</div>
</div>

<div class="final">
<div>TỔNG TIỀN</div>
<div id="grandTotal">0 VNĐ</div>
<div id="compare"></div>
</div>

</div>

<script>

const bills = [500000,200000,100000,50000,20000,10000,5000,2000,1000];

const list = document.getElementById("list");

document.addEventListener("keydown",function(e){

if(e.key !== "Enter") return;

const inputs = [
document.getElementById("target"),
...document.querySelectorAll(".qty")
];

const current = document.activeElement;
const index = inputs.indexOf(current);

if(index >= 0){
    e.preventDefault();
    const next = inputs[index + 1];
    if(next){
        next.focus();
        next.select();
    }
}
});

bills.forEach((bill,index)=>{

list.innerHTML += `
<div class="row">
<div class="money">${bill.toLocaleString("vi-VN")} VNĐ</div>

<input
type="number"
min="0"
value=""
class="qty"
id="qty${index}"
oninput="calculate()"
>

<div class="total" id="total${index}">0 VNĐ</div>
</div>
`;

});

function formatMoney(input){

    let value = input.value.replace(/[^\d-]/g,'');

    let isNegative = value.startsWith('-');

    value = value.replace(/-/g,'');

    if(!value){
        input.value = isNegative ? '-' : '';
        return;
    }

    input.value =
        (isNegative ? '-' : '') +
        Number(value).toLocaleString("vi-VN");
}

function formatBlur(input){

    let value = input.value
        .replace(/\./g,'')
        .replace(' VNĐ','');

    if(value === '' || value === '-'){
        return;
    }

    input.value =
        Number(value).toLocaleString("vi-VN") + " VNĐ";
}

function unformat(input){
    input.value = input.value.replace(" VNĐ", "");
}

function calculate(){

let grand = 0;

bills.forEach((bill,index)=>{

    const qty =
    parseInt(document.getElementById("qty"+index).value) || 0;

    const total = bill * qty;

    grand += total;

    document.getElementById("total"+index).innerText =
    total.toLocaleString("vi-VN") + " VNĐ";
});

const extraMoney =
parseInt(
    document.getElementById("extraMoney")
    .value
    .replace(/\./g,"")
    .replace(" VNĐ","")
) || 0;

grand += extraMoney;

document.getElementById("extraTotal").innerText =
extraMoney.toLocaleString("vi-VN") + " VNĐ";

document.getElementById("grandTotal").innerText =
grand.toLocaleString("vi-VN") + " VNĐ";

const target =
Number(
document.getElementById("target")
.value
.replace(/\./g,"")
.replace(" VNĐ","")
) || 0;

const compare = document.getElementById("compare");

if(target <= 0){
    compare.innerHTML = "";
    return;
}

if(grand === target){
    compare.className = "ok";
    compare.innerHTML = "✅ ĐỦ TIỀN";
}
else if(grand < target){
    compare.className = "low";
    compare.innerHTML =
    "❌ THIẾU " +
    (target-grand).toLocaleString("vi-VN") +
    " VNĐ";
}
else{
    compare.className = "high";
    compare.innerHTML =
    "💰 DƯ " +
    (grand-target).toLocaleString("vi-VN") +
    " VNĐ";
}
}

calculate();

</script>
</body>
</html>
