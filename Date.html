<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Theo dõi hạn sử dụng</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
</script>

<style>

*{box-sizing:border-box}

body{
    margin:0;
    padding:25px;
    background:#eef2f7;
    font-family:Segoe UI,Tahoma,sans-serif;
}

.panel{
    background:#fff;
    padding:20px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,.08);
    margin-bottom:20px;
}

h2{margin:0 0 15px;color:#2c3e50}

.toolbar{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

input[type=file],
input[type=text]{
    padding:10px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:14px;
}

input[type=text]{width:300px}

/* SUMMARY */
.summary{
    margin-top:15px;
    padding:12px;
    background:#f8f9fb;
    border-radius:10px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.sum-btn{
    border:none;
    padding:6px 12px;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
}

/* LIST */
#list{display:grid;gap:10px}

.item{
    display:grid;
    grid-template-columns:180px 1fr 180px;
    gap:20px;
    padding:15px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,.05);

    user-select:none;
    -webkit-user-select:none;
    touch-action:manipulation;
}

/* COLORS */
.expired{background:#2b2b2b;color:#fff}
.danger{background:#ffe2e2}
.warning{background:#fff4cc}
.safe{background:#e2ffe8}

.code{font-weight:700;font-size:18px}
.name{text-align:center}

/* HSD */
.hsd-btn{
    width:100%;
    border:none;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
}

.expired .hsd-btn{background:#111;color:#fff}
.danger .hsd-btn{background:#ff3b30;color:#fff}
.warning .hsd-btn{background:#ffcc00;color:#000}
.safe .hsd-btn{background:#28a745;color:#fff}

.toast{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#111;
    color:#fff;
    padding:10px 15px;
    border-radius:8px;
    opacity:0;
    transition:.3s;
    pointer-events:none;
}

.toast.show{opacity:1}

.empty{text-align:center;padding:30px;color:#666}


</style>
</head>

<body>

<div class="panel">

<h2>📦 THEO DÕI HẠN SỬ DỤNG</h2>

<div class="toolbar">
<button onclick="loadGoogleSheet()">
📥 Load online
</button>

<button onclick="document.getElementById('fileInput').click()">
📂 Load File
</button>

<input
    type="file"
    id="fileInput"
    accept=".xlsx,.xls,.pdf"
    style="display:none">
<input type="text" id="search" placeholder="Tìm mã hoặc tên">
</div>

<div id="summary" class="summary"></div>

</div>

<div id="list"><div class="empty">Load dữ liệu cần tra cứu</div></div>

<div id="toast" class="toast"></div>

<script>

let products=[];
let filterMode="all";
let pressTimer=null;
let pressCode=null;
// ================= LOAD =================
document.getElementById("fileInput").addEventListener("change",handleFile);
document.getElementById("search").addEventListener("input",render);

async function handleFile(e){

const file=e.target.files[0];
if(!file)return;

const name=file.name.toLowerCase();

if(name.endsWith(".pdf")){
    await loadPDF(file);
}else{
    loadExcel(file);
}

}

// ================= EXCEL =================
function loadExcel(file){

const reader=new FileReader();

reader.onload=function(evt){

const wb=XLSX.read(evt.target.result,{type:"array"});
const sheet=wb.Sheets[wb.SheetNames[0]];
const rows=XLSX.utils.sheet_to_json(sheet,{raw:false});

products=[];

rows.forEach(r=>{

const ma=String(r["mã sản phẩm"]||"").trim();
const ten=String(r["tên sản phẩm"]||"").trim();
const hsd=String(r["hạn sử dụng"]||"").trim();

if(!ma||!hsd)return;

const m=hsd.match(/^(\d{1,2})\/(\d{4})$/);
if(!m)return;

products.push({
    ma,
    ten,
    month:+m[1],
    year:+m[2],
    hsd:m[1].padStart(2,'0')+"/"+m[2]
});

});

products.sort((a,b)=>{
    if(a.year!==b.year)return a.year-b.year;
    return a.month-b.month;
});

render();

};

reader.readAsArrayBuffer(file);

}

// ================= PDF =================
async function loadPDF(file){

products=[];

const arrayBuffer=await file.arrayBuffer();

const pdf=await pdfjsLib.getDocument({
    data:arrayBuffer
}).promise;

let text="";

for(let i=1;i<=pdf.numPages;i++){

    const page=await pdf.getPage(i);

    const content=await page.getTextContent();

    text+=content.items.map(item=>item.str).join(" ")+" ";
}

// lấy tất cả mã + hsd
const regex=/(\d{5,})\s+(\d{2}\/\d{4})/g;

let match;

while((match=regex.exec(text))!==null){

    const ma=match[1];
    const hsd=match[2];

    const parts=hsd.split("/");

    products.push({
        ma,
        ten:"",
        hsd,
        month:+parts[0],
        year:+parts[1]
    });
}

products.sort((a,b)=>{
    if(a.year!==b.year)return a.year-b.year;
    return a.month-b.month;
});

render();

}

// ================= GOOGLE SHEET =================
async function loadGoogleSheet(){ try{ const sheetId = "1Wh4DUC-6eQo3PROIm6tCp1vMlHfpfwbr53j8-yTWVUo"; const url = `https://opensheet.elk.sh/${sheetId}/Trang tính1`; const res = await fetch(url); const data = await res.json(); products=[]; data.forEach(r=>{ const ma = String(r["mã sản phẩm"] || "").trim(); const ten = String(r["tên sản phẩm"] || "").trim(); const hsd = String(r["hạn sử dụng"] || "").trim(); if(!ma || !hsd) return; const m = hsd.match(/^(\d{1,2})\/(\d{4})$/); if(!m) return; products.push({ ma, ten, hsd, month:+m[1], year:+m[2] }); }); products.sort((a,b)=>{ if(a.year!==b.year) return a.year-b.year; return a.month-b.month; }); render(); toast("✅ Đã load thành công"); }catch(err){ console.error(err); toast("❌ Load lỗi"); } }

function parseCSV(csv){

products=[];

const lines = csv.split(/\r?\n/);

const headers = lines[0]
.split(",")
.map(h=>h.trim().toLowerCase());

const maIndex =
headers.findIndex(h=>h.includes("mã"));

const tenIndex =
headers.findIndex(h=>h.includes("tên"));

const hsdIndex =
headers.findIndex(h=>h.includes("hạn"));

for(let i=1;i<lines.length;i++){

    const cols = lines[i].split(",");

    if(cols.length<2) continue;

    const ma=(cols[maIndex]||"").trim();
    const ten=(cols[tenIndex]||"").trim();
    const hsd=(cols[hsdIndex]||"").trim();

    if(!ma || !hsd) continue;

    const m=hsd.match(/^(\d{1,2})\/(\d{4})$/);

    if(!m) continue;

    products.push({
        ma,
        ten,
        hsd,
        month:+m[1],
        year:+m[2]
    });
}

products.sort((a,b)=>{

    if(a.year!==b.year)
        return a.year-b.year;

    return a.month-b.month;
});

render();

}


// ================= LOGIC =================
function diff(m,y){
const n=new Date();
return (y-n.getFullYear())*12+(m-(n.getMonth()+1));
}

function type(d){
if(d<0)return"expired";
if(d<=6)return"danger";
if(d<=9)return"warning";
return"safe";
}

// ================= RENDER =================
function render(){

const key=document.getElementById("search").value.toLowerCase();

let list=products.filter(p=>
p.ma.toLowerCase().includes(key)||
(p.ten||"").toLowerCase().includes(key)
);

let ex=0,da=0,wa=0,sa=0;

let html="";

list.forEach(p=>{

const d=diff(p.month,p.year);
const c=type(d);

if(c=="expired")ex++;
if(c=="danger")da++;
if(c=="warning")wa++;
if(c=="safe")sa++;

if(filterMode!="all"&&filterMode!=c)return;

html+=`
<div class="item ${c}"

onpointerdown="startPress('${p.ma}')"
onpointerup="cancelPress()"
onpointerleave="cancelPress()"
onpointercancel="cancelPress()"
>

<div class="code">${p.ma}</div>
<div class="name">${p.ten}</div>

<div class="hsd">
<button class="hsd-btn" onclick="showHint('${c}')">
${p.hsd}<br>
<small>${d<0?"Hết hạn":"Còn "+d+" tháng"}</small>
</button>
</div>

</div>`;
});

document.getElementById("list").innerHTML=
html||"<div class='empty'>Không có dữ liệu</div>";

document.getElementById("summary").innerHTML=`
<button class="sum-btn" onclick="setFilter('all')">📦 ${list.length} </button>
<button class="sum-btn" onclick="setFilter('expired')">⚫ ${ex}</button>
<button class="sum-btn" onclick="setFilter('danger')">🔴 ${da}</button>
<button class="sum-btn" onclick="setFilter('warning')">🟡 ${wa}</button>
<button class="sum-btn" onclick="setFilter('safe')">🟢 ${sa}</button>
`;
}

// ================= FILTER =================
function setFilter(m){
filterMode=m;
render();
}

// ================= LONG PRESS COPY (FIX HERE) =================
function startPress(code){
pressCode=code;
pressTimer=setTimeout(()=>{
navigator.clipboard.writeText(pressCode)
.then(()=>toast("📋 Đã copy: "+pressCode))
.catch(()=>toast("❌ Copy lỗi"));
},1000);
}

function cancelPress(){
clearTimeout(pressTimer);
pressCode=null;
}

// ================= HINT =================
function showHint(t){

let msg="";
if(t=="expired")msg="⚫ Hết hạn";
if(t=="danger")msg="🔴 Cận hạn 1-5 tháng";
if(t=="warning")msg="🟡 6-10 tháng";
if(t=="safe")msg="🟢 An toàn";

toast(msg);
}

// ================= TOAST =================
function toast(m){
let t=document.getElementById("toast");
t.textContent=m;
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),1500);
}

</script>

</body>
</html>
