<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vocabulary Converter</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f5f7fa;
    padding:20px;
}

h1{
    text-align:center;
}

.container{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

textarea{
    width:100%;
    height:100px;
    padding:15px;
    border:1px solid #ccc;
    border-radius:10px;
    resize:vertical;
    font-size:14px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    cursor:pointer;
    margin:5px;
}

button:hover{
    background:#1d4ed8;
}

.preview{
    margin-top:20px;
    background:white;
    border-radius:10px;
    padding:20px;
    border:1px solid #ddd;
}

.card{
    display:flex;
    justify-content:space-between;
    gap:20px;
    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.left{
    flex:1;
}

.word{
    font-size:28px;
    font-weight:bold;
}

.meaning{
    font-size:20px;
    margin:10px 0;
}

.example{
    color:#666;
    font-style:italic;
}

.right img{
    width:220px;
    border-radius:12px;
}

@media(max-width:768px){

.container{
    grid-template-columns:1fr;
}

.card{
    flex-direction:column;
    text-align:center;
}

.right img{
    width:100%;
    max-width:300px;
}

}

</style>
</head>

<body>

<h1>📘 Vocabulary Converter</h1>

<div class="container">

<div>
<h3>HTML nguồn</h3>

<textarea id="input"></textarea>

<br><br>

<button onclick="convertData()">
🚀 Chuyển đổi
</button>

<button onclick="copyOutput()">
📋 Copy HTML
</button>

</div>

<div>
<h3>HTML kết quả</h3>
<textarea id="output"></textarea>
</div>

</div>

<div class="preview" id="preview">

<h3>Xem trước</h3>

</div>

<script>

function cleanText(text){

    return text
        .replace(/<[^>]+>/g,'')
        .replace(/&nbsp;/g,' ')
        .replace(/\s+/g,' ')
        .trim();

}

function convertData(){

    const source =
        document.getElementById("input").value;

    const blocks =
        source.match(
            /class="block-vocabulary"[\s\S]*?(?=class="block-vocabulary"|$)/g
        ) || [];

    let cardsHTML = '';
    let previewHTML = '';

    blocks.forEach((block,index)=>{

        const wordMatch =
            block.match(/<b>(.*?)<\/b>/i);

        const word =
            wordMatch ?
            cleanText(wordMatch[1]) :
            '';

        const audioMatch =
            block.match(
                /<source\s+src="([^"]+)"/i
            );

        const audio =
            audioMatch ?
            audioMatch[1] :
            '';

        const imgMatches =
            [...block.matchAll(
                /<img[^>]*src="([^"]+)"/gi
            )];

        let image = '';

        if(imgMatches.length){

            image =
            imgMatches[
                imgMatches.length-1
            ][1];

        }

        const pTags =
        [...block.matchAll(
            /<p[^>]*>(.*?)<\/p>/gis
        )];

        const lines =
            pTags
            .map(x=>cleanText(x[1]))
            .filter(x=>x);

        let meaning = '';
        let example = '';
        let translation = '';

        if(lines.length >= 2)
            meaning = lines[1];

        if(lines.length >= 3)
            example = lines[2];

        if(lines.length >= 4)
            translation = lines[3];

        cardsHTML += `
<!-- ${index+1} -->

<div class="card">

<div class="left">

<div class="word">
${index+1}. ${word}
<span class="speaker" onclick="playAudio(${index})">🔊</span>
</div>

<div class="meaning">
${meaning}
</div>

<div class="example">
${example}
</div>

<div class="example">
${translation}
</div>

<audio id="audio${index}" src="${audio}"></audio>

</div>

<div class="right">
<img src="${image}">
</div>

</div>

`;

        previewHTML += `
<div class="card">

<div class="left">

<div class="word">
${index+1}. ${word}
</div>

<div class="meaning">
${meaning}
</div>

<div class="example">
${example}
</div>

<div class="example">
${translation}
</div>

</div>

<div class="right">
<img src="${image}">
</div>

</div>
`;

    });

    const finalHTML = `<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vocabulary</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f5f7fa;
    margin:0;
    padding:40px;
}

h1{
    text-align:center;
    margin-bottom:30px;
    font-size:36px;
}

/* CARD */
.card{
    display:flex;
    justify-content:space-between;
    gap:40px;
    background:white;
    padding:36px;
    margin-bottom:32px;
    border-radius:24px;
    box-shadow:0 10px 30px rgba(0,0,0,.12);
}

.left{
    flex:1;
}

.word{
    font-size:40px;
    font-weight:bold;
}

.meaning{
    margin:12px 0;
    font-size:26px;
}

.example{
    font-style:italic;
    color:#555;
    font-size:24px;
}

/* ẢNH NHỎ LẠI ~70% */
.right img{
    width:260px;
    border-radius:18px;
}

/* LOA */
.speaker{
    cursor:pointer;
    margin-left:12px;
    font-size:28px;
}

/* MOBILE */
@media(max-width:600px){
    .card{
        flex-direction:column;
        align-items:center;
        text-align:center;
        padding:28px;
    }

    .right img{
        width:100%;
        max-width:320px;
    }

    .word{
        font-size:32px;
    }
}

</style>

</head>

<body>

<h1>📘 Từ Vựng</h1>

${cardsHTML}

<script>

function playAudio(i){

const audio =
document.getElementById(
"audio"+i
);

audio.currentTime = 0;
audio.play();

}

<\/script>

</body>
</html>`;

    document.getElementById("output").value =
        finalHTML;

    document.getElementById("preview").innerHTML =
        "<h3>Xem trước</h3>" +
        previewHTML;

}

function copyOutput(){

    const output =
        document.getElementById("output");

    output.select();

    document.execCommand("copy");

    alert("Đã copy HTML");

}

</script>

</body>
</html>
