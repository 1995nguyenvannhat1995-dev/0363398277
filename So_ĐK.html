  width:95%;
  padding:12px;
  font-size:18px;
  border:1px solid #ccc;
  border-radius:8px;
  margin-bottom:15px;
}

  background:#f8fafc;
  padding:15px;
  border-radius:8px;
  line-height:1.7;
}

.item{ margin-bottom:10px; }

.badge{
  padding:5px 10px;
  border-radius:6px;
  color:white;
  font-size:14px;
}

.red{ background:#e74c3c;}
.green{ background:#2ecc71;}
.orange{ background:#f39c12;}
.blue{ background:#3498db;}
.gray{ background:#7f8c8d;}

.warning{
  background:#ffecec;
  padding:10px;
  border-radius:8px;
  color:#c0392b;
  font-weight:bold;
}

  { from: 893, to: 893, name: "Việt Nam" },

  { from: 940, to: 949, name: "New Zealand" },
  { from: 955, to: 955, name: "Malaysia" }
];

// ===== MAP =====
const typeMap = {
  "1": "Hóa dược",
  "2": "Dược liệu (Đông dược)",
  "3": "Vắc xin",
  "4": "Sinh phẩm",
  "5": "Nguyên liệu",
  "6": "Gia công",
  "7": "Chuyển giao CN"
};

const prescriptionMap = {
  "0": "Không kê đơn",
  "1": "Kê đơn"
};

const controlMap = {
  "0": "Bình thường",
  "1": "Gây nghiện",
  "2": "Hướng thần",
  "3": "Tiền chất",
  "4": "Thuốc độc",
  "5": "Thuốc cấm",
  "6": "Phóng xạ"
};

// ===== GET COUNTRY =====
function getCountry(code){
  let num = parseInt(code);
  for(let c of countryRanges){
    if(num >= c.from && num <= c.to){
      return c.name;
    }
  }
  return "Không rõ";
}

// ===== PHÂN LOẠI MÃ CŨ =====
function analyzeOld(code){

  code = code.toUpperCase();

  // VD - THUỐC NỘI
  if(code.startsWith("VD-")){
    return `
      <div class="item"><b>💊 Thuốc nội</b></div>
      <div class="item">Sản xuất tại Việt Nam</div>
      <div class="item"><b>Mã:</b> ${code}</div>
    `;
  }

// VN - THUỐC NGOẠI
if(code.startsWith("VN-")){
  return `
    <div class="item"><b>💊 Thuốc ngoại</b></div>
    <div class="item">Nhập khẩu từ nước ngoài</div>
    <div class="item"><b>Mã:</b> ${code}</div>
  `;
}

// 👇 DÁN NGAY ĐÂY
if(code.startsWith("VS-")){
  return `
    <div class="item"><b>💉 Vắc xin / Sinh phẩm</b></div>
    <div class="item">Dùng trong tiêm chủng / miễn dịch</div>
    <div class="item"><b>Mã:</b> ${code}</div>
  `;
}

  // ĐÔNG Y (-H)
  if(code.includes("-H")){
    return `
      <div class="item"><b>🌿 Thuốc Đông y</b></div>
      <div class="item">Thảo dược / dược liệu</div>
      <div class="item"><b>Mã:</b> ${code}</div>
    `;
  }

  // GIA CÔNG
  if(code.includes("GC")){
    return `
      <div class="item"><b>🏭 Thuốc gia công</b></div>
      <div class="item">Sản xuất theo hợp đồng</div>
      <div class="item"><b>Mã:</b> ${code}</div>
    `;
  }

  // QUẢN LÝ ĐẶC BIỆT
  if(code.includes("QLĐB")){
    return `
      <div class="item"><b>⚠️ Thuốc quản lý đặc biệt</b></div>
      <div class="warning">Cần kiểm soát nghiêm ngặt</div>
      <div class="item"><b>Mã:</b> ${code}</div>
    `;
  }

  // TPCN
  if(code.includes("ATTP") || code.includes("XNCB") || code.includes("ĐKSP")){
    return `
      <div class="item"><b>🍀 Thực phẩm chức năng</b></div>
      <div class="warning">❗ Không phải là thuốc</div>
      <div class="item"><b>Mã:</b> ${code}</div>
    `;
  }

  // MỸ PHẨM
  if(code.includes("CBMP")){
    return `
      <div class="item"><b>💄 Mỹ phẩm</b></div>
      <div class="item">Số công bố mỹ phẩm</div>
      <div class="item"><b>Mã:</b> ${code}</div>
    `;
  }

  // VTYT
  if(code.includes("PCBA")){
    return `
      <div class="item"><b>🏥 Vật tư y tế</b></div>
      <div class="item">Khẩu trang, nước muối...</div>
      <div class="item"><b>Mã:</b> ${code}</div>
    `;
  }

  return `
    <div class="warning">🚨 Không nhận diện được mã</div>
    <div class="item"><b>Mã:</b> ${code}</div>
  `;
}

// ===== MAIN =====
function analyze(){
  let raw = document.getElementById("code").value.trim();
  let result = document.getElementById("result");

  if(!raw){
    result.innerHTML = "Nhập mã để xem kết quả...";
    return;
  }

  // ===== MÃ CŨ =====
  if(raw.includes("-") || raw.includes("/")){
    result.innerHTML = analyzeOld(raw);
    return;
  }

  // ===== MÃ MỚI =====
  let code = raw.replace(/\D/g,'');

  if(code.length < 12){
    result.innerHTML = `⏳ Đang nhập (${code.length}/12)`;
    return;
  }

  if(code.length > 12){
    result.innerHTML = "❌ Quá 12 số";
    return;
  }

  let country = code.slice(0,3);
  let type = code[3];
  let prescription = code[4];
  let control = code[5];
  let serial = code.slice(6,10);

  let yy = parseInt(code.slice(10,12));
  let year = yy >= 50 ? "19"+yy : "20"+yy;

  result.innerHTML = `
    <div class="item"><b>🌍 Quốc gia:</b> ${getCountry(country)} (${country})</div>
    <div class="item"><b>💊 Nhóm:</b> ${typeMap[type] || "Không rõ"}</div>
    <div class="item"><b>📋 Kê đơn:</b> ${prescriptionMap[prescription] || "Không rõ"}</div>
    <div class="item"><b>⚠️ Kiểm soát:</b> ${controlMap[control] || "Không rõ"}</div>
    <hr>
    <div class="item"><b>🔢 Số cấp:</b> ${serial}</div>
    <div class="item"><b>📅 Năm:</b> ${year}</div>
  `;
}

</script>
