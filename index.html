<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Demo JSON</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        textarea {
            width: 400px;
            height: 120px;
        }

        button {
            margin-top: 10px;
            margin-right: 10px;
            padding: 8px 16px;
        }

        #result {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            min-height: 50px;
            width: 400px;
        }
    </style>
</head>
<body>

    <h2>Nhập dữ liệu</h2>

    <textarea id="input"></textarea>
    <br>

    <button onclick="saveData()">Lưu</button>
    <button onclick="viewData()">Xem</button>

    <div id="result"></div>

    <script>
        async function viewData() {
            try {
                const response = await fetch("data.json");
                const data = await response.json();

                document.getElementById("result").innerText =
                    data.content;
            } catch (err) {
                alert("Không đọc được data.json");
            }
        }

        function saveData() {
            const value = document.getElementById("input").value;

            alert(
                "HTML thuần không thể ghi trực tiếp vào data.json.\n" +
                "Cần backend (Node.js/PHP/Python) để lưu:\n\n" +
                value
            );
        }
    </script>

</body>
</html>
