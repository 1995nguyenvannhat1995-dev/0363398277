<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THỜI TRANG THIÊN AN</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: #f8fefe;
            padding: 10px;
            text-align: center;
        }

        /* Canh giữa nút liên hệ và đặt ở cuối trang */
        .contact-container {
            margin-top: auto;
            margin-bottom: 20px;
        }

        #contact-info-btn {
            width: 150px;
            padding: 12px;
            background-color: #ff6347;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.3s ease;
        }

        #contact-info-btn:hover {
            background-color: #e55347;
            transform: scale(1.05);
        }

/* Bố cục mặc định cho các nút */
.button-container {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-top: 20px;
}

/* Khi màn hình nhỏ (màn hình dọc), các nút sẽ xếp thành cột */
@media (max-width: 600px) {
    .button-container {
        flex-direction: column;  /* Các nút xếp thành cột */
        gap: 20px;  /* Khoảng cách giữa các nút */
        align-items: center;  /* Canh giữa các nút */
    }

    .button-container button {
        width: 80%;  /* Nút sẽ chiếm 80% chiều rộng màn hình */
        height: 60px;  /* Tăng chiều cao nút */
    }

    /* Canh giữa nút liên hệ và thêm khoảng cách với các nút */
    .contact-container {
        margin-top: 40px;  /* Khoảng cách từ các nút tới nút liên hệ */
    }
}


        .button-container button {
            padding: 16px 25px;  /* Điều chỉnh kích thước nút */
            font-size: 20px;  /* Lớn hơn và in đậm */
            font-weight: bold;  /* In đậm chữ */
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
            width: 320px;  /* Chiều rộng của các nút */
            height: 75px;  /* Chiều cao của các nút */
        }

        .button-container button:nth-child(1) {
            background-color: #6a5acd;
            color: white;
        }

        .button-container button:nth-child(2) {
            background-color: #ff8c00;
            color: white;
        }

        .button-container button:nth-child(3) {
            background-color: #3cb371;
            color: white;
        }
        .button-container button:nth-child(4) {
            background-color: RED;
            color: white;
        }

        .button-container button:hover {
            transform: scale(1.1);
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.1);
        }

        /* Style cho Modal (Thông tin liên hệ) */
        .info-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #ccc;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.2);
            z-index: 100;
            width: 80%;
            max-width: 500px;
        }

        .info-modal h3 {
            color: #ff6347;
        }

        .info-modal h4 {
            color: #333;
        }

        .close-btn {
            display: block;
            background-color: #ff6347;
            color: white;
            border: none;
            padding: 10px;
            width: 120px;
            margin: 20px auto 0;
            border-radius: 5px;
            cursor: pointer;
        }

        .close-btn:hover {
            background-color: #e55347;
        }

    @media (orientation: portrait) {
        #responsiveImage {
            content: url('TTTA2.jpg');
        }
    }

    @media (orientation: landscape) {
        #responsiveImage {
            content: url('TTTA1.jpg');
        }
    }

    </style>
</head>
<body>
    <header>
        <img id="responsiveImage" src="TTTA1.jpg" alt="Hình ảnh A" style="max-width: 100%; height: auto;">
    </header>

    <!-- Ba nút nằm ngang -->
    <div class="button-container">
        <button onclick="window.location.href='1.html'">SẢN PHẨM THỜI TRANG</button>
        <button onclick="window.location.href='2.html'">SẢN PHẨM TRANG TRÍ TẾT</button>
        <button onclick="window.location.href='3.html'">SẢN PHẨM GIA DỤNG</button>
        <button onclick="window.location.href='4.html'">SĂN SALE</button>
    </div>

    <!-- Nút liên hệ -->
    <div class="contact-container">
        <button id="contact-info-btn">Liên hệ</button>
    </div>

    <!-- Modal cho thông tin liên hệ -->
    <div class="info-modal" id="contact-info-modal">
        <button class="close-btn" onclick="closeContactInfoModal()">Đóng</button>
        <h3>Thông Tin Liên Hệ</h3>
        <h4>Địa chỉ: Ấp 1, Bàu Cạn, Long Thành, Đồng Nai</h4>
        <h4>Điện thoại, Zalo, Facebook: 0363 398 277</h4>
    </div>

    <script>
        // Mở modal khi nhấn vào nút liên hệ
        document.getElementById('contact-info-btn').addEventListener('click', function() {
            document.getElementById('contact-info-modal').style.display = 'block'; // Hiện modal thông tin liên hệ
        });

        // Đóng modal khi nhấn nút đóng
        function closeContactInfoModal() {
            document.getElementById('contact-info-modal').style.display = 'none'; // Ẩn modal
        }
    </script>
</body>
</html>
